<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>わかやまガイド</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--indigo:#1b3a5c;--il:#2a5a8c;--ip:rgba(27,58,92,0.06);--im:rgba(27,58,92,0.12);--ib:rgba(27,58,92,0.08);--sky:#4a90c4;--sp:rgba(74,144,196,0.08);--bg:#f8f9fb;--card:#fff;--text:#1a1a2e;--t2:#5a5a6e;--t3:#a0a0b0;--green:#2d9a5c;--amber:#d4871a;--sans:'Noto Sans JP',sans-serif;--mono:'DM Mono',monospace;--r:16px;--rs:12px}
body{font-family:var(--sans);background:var(--bg);color:var(--text);height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:0;background:transparent}
input::placeholder{color:var(--t3)}

.hd{padding:20px 20px 8px;text-align:center;flex-shrink:0;position:relative;z-index:10}
.torii{display:block;width:36px;height:36px;object-fit:contain;margin:0 auto 6px;opacity:0.7}
.hd h1{font-size:18px;font-weight:600;letter-spacing:0.5px;color:var(--indigo)}
.hd .sub{font-size:10px;color:var(--t3);font-weight:500;letter-spacing:2px;margin-top:3px}
.hd-line{width:40px;height:2px;background:linear-gradient(90deg,var(--indigo),var(--sky));margin:10px auto;border-radius:1px}
.hd-btns{position:absolute;right:16px;top:16px;display:flex;gap:6px}
.hd-btn{background:none;border:1px solid var(--ib);border-radius:20px;padding:4px 10px;font-size:10px;color:var(--t3);cursor:pointer;font-family:var(--sans)}

.nav{display:flex;gap:3px;padding:0 16px 10px;flex-shrink:0;max-width:420px;margin:0 auto;width:100%}
.nav-btn{flex:1;padding:8px 0;border:none;border-radius:var(--rs);font-family:var(--sans);font-size:12px;font-weight:500;cursor:pointer;transition:all 0.25s;text-align:center}
.nav-btn.on{background:var(--indigo);color:#fff}
.nav-btn:not(.on){background:transparent;color:var(--t3)}

.content{flex:1;display:flex;flex-direction:column;min-height:0}
.vw{flex:1;display:none;flex-direction:column;min-height:0}
.vw.on{display:flex}

/* FAQ */
.faq-scroll{flex:1;overflow-y:auto;padding:0 24px 24px}
.faq-bread{display:flex;align-items:center;justify-content:center;gap:6px;padding:4px 0 16px;font-size:12px;color:var(--t3)}
.faq-bread button{background:none;border:none;color:var(--sky);font-size:12px;font-family:var(--sans);cursor:pointer;font-weight:500}
.faq-home{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:360px;margin:0 auto}
.cat-card{background:var(--card);border:1px solid var(--ib);border-radius:var(--r);padding:22px 14px 18px;cursor:pointer;transition:all 0.25s;text-align:center}
.cat-card:active{transform:scale(0.97);background:var(--ip)}
.cat-card .cn{font-size:14px;font-weight:600;color:var(--indigo)}
.cat-card .cc{font-size:11px;color:var(--t3);margin-top:5px}
.faq-items{display:flex;flex-direction:column;max-width:380px;margin:0 auto}
.faq-q{width:100%;padding:14px 0;border:none;background:transparent;font-family:var(--sans);font-size:14px;color:var(--text);text-align:center;cursor:pointer;border-bottom:1px solid var(--ib);transition:color 0.2s}
.faq-q:active{color:var(--sky)}
.faq-q:last-child{border-bottom:none}
.faq-ans{animation:fadeSlide 0.3s ease;max-width:420px;margin:0 auto}
.faq-ans h3{font-size:17px;font-weight:600;color:var(--indigo);text-align:center;margin-bottom:16px;line-height:1.5}
.faq-ans .body{font-size:13.5px;line-height:2;color:var(--t2);text-align:left}
.faq-ans .body a{color:var(--sky);text-decoration:none;border-bottom:1px solid var(--sp);word-break:break-all}
.faq-cta{margin-top:24px;padding:16px;border-radius:var(--r);background:var(--ip);border:1px solid var(--ib);cursor:pointer;text-align:center}
.faq-cta p{font-size:13px;color:var(--t2)}
.faq-cta b{color:var(--indigo)}

/* Chat */
.usage-bar{display:flex;align-items:center;gap:8px;padding:4px 24px 6px;max-width:400px;margin:0 auto;width:100%}
.usage-bar .lb{font-size:10px;color:var(--t3);font-family:var(--mono)}
.tracks{flex:1;display:flex;gap:5px}
.track{flex:1;height:3px;border-radius:2px;background:var(--ip)}
.fill{height:100%;border-radius:2px;transition:width 0.4s}
.chat-scroll{flex:1;overflow-y:auto;padding:8px 24px}
.msg{display:flex;flex-direction:column;margin-bottom:12px}
.msg.user{align-items:flex-end}
.msg.assistant{align-items:flex-start}
.bubble{max-width:84%;padding:11px 15px;font-size:13.5px;line-height:1.8;white-space:pre-wrap;word-break:break-word}
.bubble a{color:var(--sky);text-decoration:underline;word-break:break-all}
.msg.assistant .bubble{border-radius:16px 16px 16px 4px;background:var(--card);border:1px solid var(--ib)}
.msg.user .bubble{border-radius:16px 16px 4px 16px;background:var(--indigo);color:rgba(255,255,255,0.95)}
.mbadge{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-family:var(--mono);border-radius:6px;padding:2px 7px;margin-top:3px}
.mbadge .dot{width:4px;height:4px;border-radius:50%}
.typing{display:flex;margin-bottom:12px}
.typing-in{padding:11px 16px;border-radius:16px 16px 16px 4px;background:var(--card);border:1px solid var(--ib);display:flex;align-items:center;gap:8px}
.dots{display:flex;gap:3px}
.d{width:5px;height:5px;border-radius:50%;opacity:0.4;animation:bounce 1.2s infinite}
.d:nth-child(2){animation-delay:0.15s}
.d:nth-child(3){animation-delay:0.3s}
.err-msg{text-align:center;color:#b33;font-size:12px;padding:8px;background:rgba(180,50,50,0.06);border-radius:var(--rs);margin:8px 32px}
.speak-stop{display:none;justify-content:center;padding:0 0 6px}
.speak-stop button{background:var(--ip);border:none;border-radius:20px;padding:5px 14px;font-size:11px;color:var(--indigo);cursor:pointer;font-family:var(--sans)}
.in-area{padding:6px 20px 16px}
.in-row{display:flex;align-items:flex-end;gap:6px;max-width:480px;margin:0 auto}
.mic,.vbtn{width:38px;height:38px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;border:1px solid var(--ib);background:var(--card);transition:all 0.2s}
.mic.on{border-color:var(--sky);background:var(--sp);animation:pulse 1.5s infinite}
.vbtn.on{background:var(--ip);border-color:var(--im)}
.in-wrap{flex:1;display:flex;background:var(--card);border-radius:20px;border:1px solid var(--ib);overflow:hidden}
.in-wrap input{flex:1;border:none;outline:none;padding:9px 14px;font-size:14px;font-family:var(--sans);background:transparent;color:var(--text)}
.send{background:transparent;border:none;border-radius:0 20px 20px 0;padding:0 14px;color:var(--t3);font-size:16px;cursor:not-allowed;transition:all 0.2s;display:flex;align-items:center}
.send.ready{background:var(--indigo);color:#fff;cursor:pointer}

/* QR */
.qr-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
.qr-wrap h2{font-size:16px;font-weight:600;color:var(--indigo);margin-bottom:8px}
.qr-wrap p{font-size:12px;color:var(--t2);margin-bottom:20px;line-height:1.6}
#qrcode{display:inline-block}
.qr-url{font-size:10px;color:var(--t3);font-family:var(--mono);margin-top:12px;word-break:break-all}

/* Footer */
.ft{padding:6px 0;text-align:center;flex-shrink:0}
.ft p{font-size:9px;color:var(--t3);font-family:var(--mono)}

/* Modal */
.modal-bg{position:fixed;inset:0;z-index:100;background:rgba(27,58,92,0.25);backdrop-filter:blur(16px);display:none;align-items:center;justify-content:center;padding:20px}
.modal-bg.show{display:flex}
.modal{background:var(--card);border-radius:20px;padding:28px;max-width:360px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.1);position:relative}
.modal-x{position:absolute;top:10px;right:10px;background:rgba(0,0,0,0.04);border:none;width:26px;height:26px;border-radius:50%;font-size:12px;color:var(--t3);cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal h2{text-align:center;font-size:16px;font-weight:600;color:var(--indigo);margin-bottom:4px}
.modal .desc{text-align:center;font-size:12px;color:var(--t2);line-height:1.6;margin-bottom:16px}
.modal input[type="password"]{width:100%;padding:10px 12px;border-radius:var(--rs);border:1px solid var(--ib);font-size:13px;font-family:var(--mono);background:var(--bg);outline:none}
.modal input:focus{border-color:var(--sky)}
.modal .lnk{display:block;text-align:center;margin:8px 0;font-size:11px;color:var(--sky);text-decoration:none;font-weight:500}
.modal .sbtn{width:100%;padding:11px;border-radius:var(--rs);border:none;background:rgba(0,0,0,0.04);color:var(--t3);font-size:14px;font-weight:600;cursor:not-allowed;font-family:var(--sans);transition:all 0.2s}
.modal .sbtn.ready{background:var(--indigo);color:#fff;cursor:pointer}
.modal .info{margin-top:12px;padding:10px;border-radius:var(--rs);background:var(--ip);font-size:10px;color:var(--t2);line-height:1.6;text-align:center}

@keyframes fadeSlide{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:translateX(0)}}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-4px)}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(74,144,196,0.15)}50%{box-shadow:0 0 0 8px rgba(74,144,196,0)}}
.msg-anim{animation:fadeSlide 0.3s ease}
</style>
</head>

// ═══ NAV ═══
function renderNav(){
  const t=T[lang];

  ].map(n=>`<button class="nav-btn ${n.id==='faq'?'on':''}" data-v="${n.id}" onclick="showView('${n.id}')">${n.l}</button>`).join("");

function showView(v){
  if(v==="chat"&&!apiKey){showModal();return}
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.toggle("on",b.dataset.v===v));
  ["faqView","chatView","qrView"].forEach(id=>{document.getElementById(id).classList.toggle("on",id===v+"View")});
  if(v==="chat")scrollChat();
  if(v==="qr")initQR();
}

// ═══ FAQ ═══
function curFaq(){return lang==="ja"?FAQ_JA:FAQ_EN}
function renderFaq(){
  const el=document.getElementById("faqScroll"),t=T[lang],faq=curFaq();
  if(faqLv==="home"){
    el.innerHTML=`<div class="faq-home">${faq.map(c=>`<div class="cat-card" onclick="openCat('${c.id}')"><div class="cn">${c.name}</div><div class="cc">${c.items.length}${lang==="ja"?"件":" items"}</div></div>`).join("")}</div><div class="faq-cta" onclick="showView('chat')"><p>${t.ctaText}<br><b>${t.ctaBold}</b> ${t.ctaSuf}</p></div>`;
  }else if(faqLv==="cat"){
    const c=faq.find(x=>x.id===faqCat);
    el.innerHTML=`<div class="faq-bread"><button onclick="goHome()">${lang==="ja"?"ホーム":"Home"}</button><span>›</span><span>${c.name}</span></div><div class="faq-items" style="animation:fadeSlide 0.3s">${c.items.map((it,i)=>`<button class="faq-q" onclick="openAns('${faqCat}',${i})">${it.q}</button>`).join("")}</div>`;
  }else{
    const c=faq.find(x=>x.id===faqCat),it=c.items[faqIdx];
    el.innerHTML=`<div class="faq-bread"><button onclick="goHome()">${lang==="ja"?"ホーム":"Home"}</button><span>›</span><button onclick="openCat('${faqCat}')">${c.name}</button><span>›</span><span>${lang==="ja"?"回答":"Answer"}</span></div><div class="faq-ans"><h3>${it.q}</h3><div class="body">${lnk(it.a)}</div></div>`;
  }
  el.scrollTop=0;
}
function goHome(){faqLv="home";faqCat=null;faqIdx=null;renderFaq()}
function openCat(id){faqLv="cat";faqCat=id;renderFaq()}
function openAns(c,i){faqLv="answer";faqCat=c;faqIdx=i;renderFaq()}
function lnk(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>").replace(/(https?:\/\/[^\s<]+)/g,'<a href="$1" target="_blank" rel="noopener">$1</a>')}

function rstDay(){const d=new Date().toDateString();if(usage.date!==d)usage={date:d,lite:0,flash:0,pro:0}}
function canUse(t){rstDay();return usage[t]<MODELS[t].limit}
function inc(t){rstDay();usage[t]++;updUI()}
function updUI(){rstDay();const r={lite:MODELS.lite.limit-usage.lite,flash:MODELS.flash.limit-usage.flash,pro:MODELS.pro.limit-usage.pro};document.getElementById("uL").style.width=(r.lite/MODELS.lite.limit*100)+"%";document.getElementById("uF").style.width=(r.flash/MODELS.flash.limit*100)+"%";document.getElementById("uP").style.width=(r.pro/MODELS.pro.limit*100)+"%";document.getElementById("uC").textContent=(r.lite+r.flash+r.pro).toLocaleString()+(lang==="ja"?"回":"")}

async function loadInfo(){if(infoLoaded)return;try{const r=await fetch(GAS_URL+"?action=getInfo");const j=await r.json();infoDB=(j.data||[]).filter(e=>e.active==="○");infoLoaded=true}catch(e){}}
setInterval(()=>{infoLoaded=false},300000);

function buildSys(){
  let p=SYSTEM_PROMPT;
  if(infoDB.length){p+="\n\n## 管理者登録の最新情報（最優先で参照）\n";infoDB.forEach(e=>{p+="\n【"+e.category+"】"+e.title+"\n"+e.content+"\n"})}
  return p;
}

// ═══ API ═══
function classify(t){if(/^(こんにちは|ありがとう|はい|いいえ|hello|hi|thanks|bye|ok|うん)/i.test(t.trim())||t.trim().length<8)return"lite";return"flash"}
function tierQ(t){const p=classify(t);return(p==="lite"?["lite","flash","pro"]:["flash","lite","pro"]).filter(x=>canUse(x)&&!dead.has(x))}

async function callAI(tier,hist){
  await loadInfo();
  const url=`https://generativelanguage.googleapis.com/v1beta/models/${MODELS[tier].id}:generateContent?key=${apiKey}`;
  const body={system_instruction:{parts:[{text:buildSys()}]},contents:hist,generationConfig:{maxOutputTokens:4096,temperature:0.7},tools:[{google_search:{}}]};
  const res=await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  if(!res.ok){
    const e=await res.json().catch(()=>({}));const msg=e?.error?.message||`Error ${res.status}`;
    if(msg.includes("google_search")||msg.includes("tool")||msg.includes("INVALID")){delete body.tools;const r2=await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});if(!r2.ok){const e2=await r2.json().catch(()=>({}));throw new Error(e2?.error?.message||`Error`)}const d2=await r2.json();return d2?.candidates?.[0]?.content?.parts?.map(p=>p.text).join("")||""}
    const isQ=res.status===429||msg.toLowerCase().includes("quota")||msg.toLowerCase().includes("rate");
    if(isQ){dead.add(tier);const err=new Error(msg);err.isQuota=true;throw err}
    throw new Error(msg);
  }
  const d=await res.json();return d?.candidates?.[0]?.content?.parts?.map(p=>p.text).join("")||"";
}

// ═══ GENRE ═══
const GENRES={bus:{kw:/バス|のりば|乗り場|系統|停留所|時刻|bus|stop/i,l:"バス路線"},spot:{kw:/城|寺|神社|島|崎|浦|観光|名所|castle|temple|shrine|island/i,l:"観光スポット"},gourmet:{kw:/ラーメン|グルメ|食べ|ランチ|名物|ramen|food|eat/i,l:"グルメ"},access:{kw:/アクセス|行き方|電車|駅|空港|access|train|station/i,l:"アクセス"},event:{kw:/祭|花火|桜|紅葉|イベント|festival|cherry|event/i,l:"季節"},plan:{kw:/コース|プラン|おすすめ|plan|recommend|course/i,l:"プラン"},info:{kw:/Wi-?Fi|案内所|ホテル|料金|info|wifi|hotel/i,l:"お役立ち"}};
function genreKW(t){for(const[,g]of Object.entries(GENRES))if(g.kw.test(t))return g.l;return null}
async function genreAI(t){if(!apiKey||!canUse("lite"))return"その他";try{const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODELS.lite.id}:generateContent?key=${apiKey}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{role:"user",parts:[{text:`質問を1ジャンルに分類。ジャンル名のみ返す。候補:バス路線,観光スポット,グルメ,アクセス,季節,プラン,お役立ち,その他\n\n${t}`}]}],generationConfig:{maxOutputTokens:20,temperature:0}})});if(!r.ok)return"その他";const d=await r.json();inc("lite");return d?.candidates?.[0]?.content?.parts?.[0]?.text?.trim()||"その他"}catch{return"その他"}}
async function getGenre(t){return genreKW(t)||await genreAI(t)}
function detectLang(t){return/[\u3040-\u309F\u30A0-\u30FF\u4E00-\u9FFF]/.test(t)?"日本語":"英語"}

// ═══ LOG ═══
function sendLog(q,a,g,m,l){if(!GAS_URL)return;try{const p=new URLSearchParams({question:q.substring(0,500),answer:a.substring(0,500),genre:g,model:m,lang:l});new Image().src=GAS_URL+"?"+p;fetch(GAS_URL,{method:"POST",body:JSON.stringify({question:q,answer:a,genre:g,model:m,lang:l}),mode:"no-cors"}).catch(()=>{})}catch(e){}}

// ═══ SEND ═══
async function sendMsg(ov){
  const inp=document.getElementById("chatIn"),text=(ov||inp.value).trim();
  if(!text||loading)return;inp.value="";updSend();
  const t=T[lang];
  const q=tierQ(text);if(!q.length){showErr(t.exhaust);return}
  messages.push({role:"user",content:text,model:null});renderChat();loading=true;
  const hist=messages.filter((_,i)=>i>0).map(m=>({role:m.role==="assistant"?"model":"user",parts:[{text:m.content}]}));
  let ok=false;
  for(const tier of q){hideTyp();showTyp(tier);try{const reply=await callAI(tier,hist);inc(tier);messages.push({role:"assistant",content:reply,model:tier});hideTyp();renderChat();speak(reply);
    const genre=await getGenre(text);const ln=detectLang(text);sendLog(text,reply,genre,MODELS[tier].label,ln);
    ok=true;break}catch(e){if(e.isQuota)continue;hideTyp();showErr(e.message?.includes("API key")?"APIキーが無効です。":"Error: "+e.message);ok=true;break}}
  if(!ok){hideTyp();showErr(t.allDead)}
  loading=false;updUI();
}
function updSend(){document.getElementById("sendBtn").classList.toggle("ready",!!document.getElementById("chatIn").value.trim())}

// ═══ VOICE ═══
function speak(t){if(!voiceOn)return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t.replace(/[\u{1F300}-\u{1FAD6}\u{2600}-\u{27BF}]/gu,"").trim());u.lang=lang==="ja"?"ja-JP":"en-US";u.rate=1.05;u.onstart=()=>{isSpeaking=true;document.getElementById("spkStop").style.display="flex"};u.onend=u.onerror=()=>{isSpeaking=false;document.getElementById("spkStop").style.display="none"};speechSynthesis.speak(u)}
function stopSpk(){speechSynthesis.cancel();isSpeaking=false;document.getElementById("spkStop").style.display="none"}
function toggleV(){voiceOn=!voiceOn;const b=document.getElementById("vBtn");b.textContent=voiceOn?"🔊":"🔇";b.classList.toggle("on",voiceOn);if(!voiceOn&&isSpeaking)stopSpk()}
function toggleMic(){if(isListening){recognition?.stop();return}const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){showErr("音声認識非対応");return}recognition=new SR();recognition.lang=lang==="ja"?"ja-JP":"en-US";recognition.continuous=false;recognition.interimResults=false;recognition.onresult=e=>{const t=e.results[0][0].transcript;document.getElementById("chatIn").value=t;updSend();setLis(false);setTimeout(()=>sendMsg(t),200)};recognition.onerror=recognition.onend=()=>setLis(false);recognition.start();setLis(true)}
function setLis(v){isListening=v;document.getElementById("micBtn").classList.toggle("on",v);document.getElementById("chatIn").placeholder=v?(lang==="ja"?"聴いています…":"Listening…"):T[lang].ph}

// ═══ MODAL ═══
function showModal(){document.getElementById("keyModal").classList.add("show")}
function closeModal(){document.getElementById("keyModal").classList.remove("show")}
function updSave(){document.getElementById("saveBtn").classList.toggle("ready",!!document.getElementById("keyIn").value.trim())}
function saveKey(){const v=document.getElementById("keyIn").value.trim();if(!v)return;apiKey=v;try{sessionStorage.setItem("gemini_key",v)}catch{}closeModal();updKeyBtn();showView("chat")}
function resetKey(){apiKey="";try{sessionStorage.removeItem("gemini_key")}catch{}updKeyBtn();showView("faq")}
function updKeyBtn(){document.getElementById("keyBtn").style.display=apiKey?"block":"none"}
</script>
